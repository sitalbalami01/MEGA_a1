<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document Object Model</title>
</head>
<body>
    <div 
        style="
            height: 100vh; width: 100vw;
            background-color: bisque;
            display: flex; gap: 100px; flex-wrap: wrap;
            padding: 200px;"
            id="parent"
    >
        <div style="height: 200px; width: 200px; background-color: red;" id="div1" class="child">
            div text content 1
        </div>
        <div style="height: 200px; width: 200px; background-color: blue;" id="div2" class="child">
            div text content 2
        </div>
        <div style="height: 200px; width: 200px; background-color: yellow;" id="div3" class="child">
            div text content 3
        </div>
        <div style="height: 200px; width: 200px; background-color: green;" id="div4" class="child">
            div text content 4
        </div>
    </div>
     <script src="./scripts/dom.js"></script>
</body>
</html>
